services:
  postgres:
    image: postgres:15-alpine
    restart: unless-stopped
    env_file: .env
    volumes:
      - ./data/postgres:/var/lib/postgresql/data
    networks:
      - grapevine-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./server
      dockerfile: Dockerfile
    restart: unless-stopped
    env_file: .env
    environment:
      - DATABASE_URL=postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
    networks:
      - grapevine-network
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        BASE_PATH: /grapevine
    restart: unless-stopped
    ports:
      - "4001:80"
    networks:
      - grapevine-network
    depends_on:
      - backend

networks:
  grapevine-network:
